<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ねこのおせわ</title>
  <link rel="stylesheet" href="css.css">
</head>

<body>
  <main>
    <section class="cat-display">
      <div class="cat-textArea">
        <p class="cat-text"></p>
      </div>
      <div class="cat-illust">
        <img src="images/cat-default.png" alt="cat" width="350px">
      </div>
      <div class="result-textArea">
        <p class="result-text"></p>
      </div>
    </section>
    <section class="commands">
      <button type="button" id="foods-btn" data-id="0">ごはんをあげる</button>
      <button type="button" id="treats-btn" data-id="1">おやつをあげる</button>
      <button type="button" id="play-btn" data-id="2">あそぶ</button>
      <button type="button" id="bath-btn" data-id="3">おふろにいれる</button>
    </section>
  </main>
  <script src="java.js"></script>
</body>

</html>
